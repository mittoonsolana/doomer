                    copyBtn.textContent = 'Copy CA';
                }, 2000);
            });
        });

        // Auto scroll functionality - simplified
        const scrollContainer = document.querySelector('.horizontal-scroll-container');
        let isPaused = false;
        let scrollPosition = 0;
        let halfWidth = 0;
        let lastUpdate = Date.now();

        // Initialize
        function initScroll() {
            if (!scrollContainer) return;
            halfWidth = scrollContainer.scrollWidth / 2;
            scrollPosition = 0;
            scrollContainer.scrollLeft = 0;
            lastUpdate = Date.now();
        }

        window.addEventListener('load', () => {
            const pageLoader = document.getElementById('pageLoader');
            if (pageLoader) {
                pageLoader.style.opacity = '0';
                pageLoader.style.pointerEvents = 'none';
                setTimeout(() => pageLoader.remove(), 250);
            }
            setTimeout(initScroll, 500);
        });

        // Calculate speed
        function getScrollSpeed() {
            return window.innerWidth >= 768 ? halfWidth / 15 : halfWidth / 14; // pixels per second
        }

        // Animation loop
        function autoScroll() {
            if (!isPaused && scrollContainer) {
                const now = Date.now();
                const delta = (now - lastUpdate) / 1000;
                const speed = getScrollSpeed();
                
                scrollPosition += delta * speed;
                
                // Reset to start when we hit the duplicate section
                if (scrollPosition >= halfWidth) {
                    scrollPosition = 0;
                }
                
                scrollContainer.scrollLeft = scrollPosition;
                lastUpdate = now;
            }
            requestAnimationFrame(autoScroll);
        }

        // Pause events
        scrollContainer.addEventListener('touchstart', () => isPaused = true);
        scrollContainer.addEventListener('mousedown', () => isPaused = true);
        scrollContainer.addEventListener('mouseenter', () => isPaused = true);

        // Resume events - reset scroll position to current location
        function resumeScroll() {
            isPaused = false;
            scrollPosition = scrollContainer.scrollLeft;
            lastUpdate = Date.now();
        }

        scrollContainer.addEventListener('mouseleave', resumeScroll);
        scrollContainer.addEventListener('touchend', resumeScroll);
        scrollContainer.addEventListener('mouseup', resumeScroll);

        // Sync scrollPosition if user scrolls manually
        scrollContainer.addEventListener('scroll', () => {
            if (isPaused) {
                scrollPosition = scrollContainer.scrollLeft;
                // Reset if user goes past half
                if (scrollPosition >= halfWidth) {
                    scrollContainer.scrollLeft = scrollPosition - halfWidth;
                    scrollPosition = scrollContainer.scrollLeft;
                }
            }
        });

        // Start it
        setTimeout(() => {
            initScroll();
            autoScroll();
        }, 1000);
    </script>
